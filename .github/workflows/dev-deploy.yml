name: Deploy to Dev Server

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Copy specific directories
        run: |
          # Copy sources to remote

          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "Deploying to PRODUCTION"
            SERVER="63.176.10.235"
          elif [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "Deploying to DEV"
            SERVER="3.79.239.99"
          fi

          # Make sure rsync is present on the remote host (Bitnami AMIs don't always ship it).
          ssh -o StrictHostKeyChecking=no bitnami@$SERVER '
            if ! command -v rsync >/dev/null 2>&1; then
              echo "rsync not found on remote, installing..."
              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update -y && sudo apt-get install -y rsync
              elif command -v yum >/dev/null 2>&1; then
                sudo yum install -y rsync
              else
                echo "No supported package manager found to install rsync" >&2
                exit 1
              fi
            fi
          '

          rsync -avz --progress -e "ssh -o StrictHostKeyChecking=no" ./*  bitnami@$SERVER:/opt/bitnami/wordpress/wp-content/themes/Panterrea/
